spring:
  application:
    name: sf-localstack
  profiles:
    active: dev
  jpa:
    show-sql: false
  h2:
    console:
      enabled: true
      path: /h2-console
  mvc:
    async:
      request-timeout: -1

server:
  port: 8080

sf-localstack:
  api-version: v60.0
  seed-file: classpath:seed/default-seed.yml
  jwt:
    secret: ""

logging:
  level:
    co.razkevich: DEBUG
